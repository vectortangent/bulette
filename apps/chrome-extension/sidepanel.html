<!doctype html>
<html>
  <head>
    <style>
      .tree-root, .tree-children {
        list-style: none;
        padding-left: 16px;
        margin: 0;
        font-family: monospace;
        font-size: 12px;
        line-height: 1.6;
      }
      .tree-root { padding-left: 0; max-height: 300px; overflow: auto; border: 1px solid #ddd; border-radius: 4px; padding: 8px; margin: 8px 0; }
      .tree-toggle { cursor: pointer; user-select: none; }
      .tree-toggle:hover { background: #f0f0f0; border-radius: 2px; }
      .tree-key { color: #881391; }
      .tree-string { color: #c41a16; }
      .tree-number { color: #1c00cf; }
      .tree-boolean { color: #0d22aa; }
      .tree-null { color: #808080; }
      .tree-preview { color: #999; font-size: 11px; }
      .tree-url { color: #1a0dab; text-decoration: underline; font-size: 11px; }
      .tree-empty { color: #999; font-style: italic; padding: 8px; }
      .tree-leaf, .tree-branch { white-space: nowrap; }

      .progress { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
      .progress.hidden { display: none; }
      .progress-spinner {
        width: 16px; height: 16px;
        border: 2px solid #ddd;
        border-top-color: #4a90d9;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .progress-text { font-size: 13px; color: #555; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main>
      <h1>Bulette</h1>
      <textarea id="prompt" placeholder="Enter command"></textarea>
      <input id="provider" placeholder="Provider URL" />
      <input id="model" placeholder="Model" />
      <button id="refreshState">Refresh Board State</button>
      <button id="generate">Generate Plan</button>
      <button id="send">Send to Owlbear</button>
      <button id="apply">Apply Last Plan</button>
      <div id="progress" class="progress hidden">
        <div class="progress-spinner"></div>
        <span class="progress-text"></span>
      </div>
      <pre id="boardState"></pre>
      <div id="boardStateTree"></div>
      <pre id="dsl"></pre>
      <pre id="errors"></pre>
    </main>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
